<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Forest</title>
    
</head>
<body>
    <div id="forestBgImg" class="bg-[url('/assets/bgImg/Forestlvl1.png')] bg-cover bg-no-repeat bg-center h-screen w-screen relative">
        <img src="./assets/topSignPost.png"/>
        <div class="treeSap" id="treeSap">
            
        </div>
        
    </div>
    <script src="hackatime.js"></script>
    <script>
        let treeCounter = 0;
        


        async function genTreeHole(){

        }

        async function shrubs() {

        }

        async function backgroundImgChanges() {
            try{
                const stats = await getHackatimeStats();
                const horsDec = stats.total_seconds / 3600;
                const forestBgImg = document.getElementById("forestBgImg");

                if(horsDec>6){
                    forestBgImg.style.backgroundImage = "url('/assets/bgImg/Forestlvl4.png')";
                }
                else if(horsDec>4){
                    forestBgImg.style.backgroundImage = "url('/assets/bgImg/Forestlvl3.png')";
                }
                else if(horsDec>2){
                    forestBgImg.style.backgroundImage = "url('/assets/bgImg/Forestlvl2.png')";
                }
                else {
                    forestBgImg.style.backgroundImage = "url('/assets/bgImg/Forestlvl1.png')";
                }
            }catch(err){
                    console.error(err);
                }
        }
        async function putTreeSapling(){
            try{
                const stats = await getHackatimeStats();

                document.getElementById("treeSap").innerHTML=stats.total_hours;
                const horsDec = stats.total_seconds / 3600;
                if(horsDec > 1){
                    document.getElementById("treeSap").innerHTML = '<img class="w-64 h-64" src="./assets/treeSapling.png"/>';
                    console.log("wow");
                    treeCounter++;
                    localStorage.setItem("treeSaplingsinForest", treeCounter)
                }
            }catch(err){
                    console.error(err);
                }
        }
        putTreeSapling();
        backgroundImgChanges();
    </script>
</body>
</html>
