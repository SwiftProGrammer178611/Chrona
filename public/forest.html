<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css"/>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Forest</title>
    
</head>
<body>
    <style>
        #forestBgImg.page-transition{ animation: arriveAtForest 1s ease-out;}
        @keyframes arriveAtForest {
            from {transform:scale(1.5); filter: brightness(0.3);}
            to { transform: scale(1); filter: brightness(1);}
        }
        .plantSprite {
            transition: opacity 0.6s ease, width 0.6s ease, height 0.6s ease;
        }

        #forestBgImg.leaving-forest{
            animation: walkAwayFromForest 1s ease-in forwards;
        }
        @keyframes walkAwayFromForest {
            from {transform: scale(1); filter: brightness(1); }
            to {transform: scale(1.8); filter: brightness(0.2);}
        }
    </style>

    <div id="forestBgImg" class="forestBgImg bg-[url('/assets/bgImg/Forestlvl1.png')] bg-cover bg-no-repeat bg-center h-screen w-screen relative">
        <img src="./assets/topSignPost.png" class="pl-8 w-100 h-64">
        <div id="tierBoard" class="absolute top-4 left-4 pt-[9%] pl-[10%] text-white p-3 rounded z-30">
        </div>
    </div>
    <script src="hackatime.js"></script> 

    <script>
        
        document.getElementById("forestBgImg").classList.add("page-transition");
        //Current implementations: Different plants, tier system, unlocking system, and growth cycling with tracked time, live it 'grows'. 
        let tier = 0;
        const plant_config = {
            tree: { images: ["bgImg/treeStage1.png", "bgImg/treeStage2.png", "bgImg/treeStage3.png", "bgImg/treeStage4.png"], sizes: ["w-8 h-8", "w-10 h-10", "w-14 h-14", "w-20 h-20"]},
            shrub: { images: ["bgImg/shrubStage1.png", "bgImg/shrubStage2.png" ], sizes: ["w-14 h-14", "w-64 h-64"]},
            pine: { images: ["bgImg/pineStage1.png", "bgImg/pineStage2.png", "bgImg/pineStage3.png"], sizes: ["w-8 h-8", "w-10 h-10", "w-64 h-64"]},
            cherry: { images: ["bgImg/cherryStage1.png", "bgImg/cherryStage2.png", "bgImg/cherryStage3.png"], sizes: ["w-10 h-10", "w-14 h-14", "w-64 h-64"]},
        };
        
        const secondsPerStage = 90;
        const maxSecondsPerStage = 100;

        function rollStageThresholds(type) {
            const numTransitions = plant_config[type].images.length -1;
            let cumulative = 0;
            const thresholds = [];
            for(let i=0; i< numTransitions; i++){
                cumulative += secondsPerStage + Math.random() * (maxSecondsPerStage - secondsPerStage);
                thresholds.push(Math.round(cumulative));
            }
            return thresholds;
        }

        function getCurrentStage(plant, currentTotalSeconds){
            const elapse = currentTotalSeconds - plant.plantedAtSeconds;
            let stage = 0;
            plant.stageThresholds.forEach((t,i) => {if(elapse >= t) stage = i+1; });
            return stage;
        }

        function renderAllPlants(currentTotalSeconds) {
            const ground = document.getElementById("forestBgImg");
            const plants = JSON.parse(localStorage.getItem("treeSIF") || "[]");
            
            plants.forEach((p,i) => {
                const stage = getCurrentStage(p,currentTotalSeconds);
                const size = plant_config[p.type].sizes[stage];
                const src = `assets/${plant_config[p.type].images[stage]}`;

                let img = document.querySelector(`.plantSprite[data-index="${i}"]`);

                if(!img){
                    img = document.createElement("img");
                    img.className = "plantSprite absolute z-10";
                    img.dataset.index = i; 
                    img.dataset.stage=stage
                    img.style.left = `${p.x}%`;
                    img.style.top = `${p.y-4}%`;
                    img.style.opacity = "0";
                    img.src = src;
                    ground.appendChild(img);

                    requestAnimationFrame(() => {
                        img.classList.add(...size.split(" "));
                        img.style.opacity = "1";
                    });
                }else if (Number(img.dataset.stage) !== stage){
                    img.style.opacity = "0";
                    setTimeout(() => {
                        
                        img.src = src;
                        img.className = `plantSprite absolute ${size} z-10`;
                        img.dataset.stage = stage;
                        img.style.left = `${p.x}%`;
                        img.style.top = `${p.y-4}%`;
                        img.style.opacity = "1";
                    }, 600)
                }
            });
        }

        const tiers_forest = [
            {
                type: "tree",
                label: "Trees",
                unlockAt: 0
            },
            {
                type: "shrub",
                label: "Shrubs",
                unlockAt: 10 // 10 trees
            },
            {
                type: "pine",
                label: "Pine Trees",
                unlockAt: 10 // 10 shrubs
            },
            {
                type: "cherry",
                label: "Cherry Trees",
                unlockAt: 5 //5 pines
            }
        ]

        function getTierProgress() {
            const plants = JSON.parse(localStorage.getItem("treeSIF")||"[]");
            const counts = {tree:0,shrub:0,pine:0, cherry:0};
            plants.forEach((p,i) => {if (counts[p.type] !== undefined) counts[p.type]++; });

            let unlockedTiers=[];
            let nextTier = null;

            for(let i=0; i<tiers_forest.length; i++){
                const tier = tiers_forest[i];

                if(i===0){unlockedTiers.push(tier); continue;}

                const prevTier = tiers_forest[i-1];
                if(counts[prevTier.type] >= tier.unlockAt){
                    unlockedTiers.push(tier);
                }else{
                    nextTier = {...tier,progress:counts[prevTier.type], needed: tier.unlockAt, from: prevTier.label};
                    break;
                }

                
            }
            return { counts, unlockedTiers, nextTier };
        }

        function pickRandomPlantType() {
            const { unlockedTiers } = getTierProgress();
            const idx = Math.floor(Math.random() * unlockedTiers.length);
            return unlockedTiers[idx].type;
        }

        function goHome() {
            document.querySelector(".forestBgImg").classList.add("leaving-forest");
            setTimeout(()=>{
                window.location.href = "dashboard.html";
            },1200)
            
        }

        function renderTierBoard() {
            const {counts,unlockedTiers,nextTier}=getTierProgress();
            const board = document.getElementById("tierBoard");
            const unlockedTypes = unlockedTiers.map(t=>t.type);
            let countsHTML = "";

            if(unlockedTypes.includes("tree")){
                countsHTML += `<div class="text-emerald-100">Trees: ${counts.tree}</div> <button onclick = "goHome()">Go back</button>`;
            }
            if(unlockedTypes.includes("shrub")){
                countsHTML += `<div class="text-yellow-400">Shrubs: ${counts.shrub}</div>`;
            }
            if(unlockedTypes.includes("pine")){
                countsHTML += `<div class="text-green-900">Pine Trees: ${counts.pine}</div>`;
            }
            if(unlockedTypes.includes("cherry")){
                countsHTML += `<div class=" text-rose-400">Cherry Trees: ${counts.cherry}`;
            }

            let progressHTML;

            if(nextTier){
                const pct = Math.min(100,(nextTier.progress/nextTier.needed)*100);
                progressHTML = `
                <div class="mt-2 text-sm">${nextTier.progress}/${nextTier.needed} ${nextTier.from} to unlock ${nextTier.label}</div>
                <div class=" w-full bg-emerald/30 rounded-full h-3 mt-1"><div class="bg-orange-400 h-3 rounded-full" style="width:${pct}%"></div></div>`;
            }else{
                progressHTML=`<div class="mt-2 text-sm text-green-300"> ALL TIERS UNLOCKED :)</div>`;
            }
            board.innerHTML = `<div class="text-xl">${countsHTML}</div>${progressHTML}`;
        }

        

        function genTreeHole(){
            const gnd = document.getElementById("forestBgImg");

            const x = 10 + Math.random() * 80;
            const y = 60 + Math.random() * 30;

            const hole = document.createElement("img");
            hole.src = "/assets/bgImg/plantHole.png";
            hole.className = "absolute w-16 h-16 z-20";
            hole.style.left = `${x}%`;
            hole.style.top = `${y}%`;
            gnd.appendChild(hole);
            return{hole,x,y};
        }

        async function shrubs() {

        }

        async function backgroundImgChanges() {
            try{
                const stats = await getHackatimeStats();
                const horsDec = stats.total_seconds / 3600;
                const forestBgImg = document.getElementById("forestBgImg");

                if(horsDec>70){
                    forestBgImg.style.backgroundImage = "url('/assets/bgImg/Forestlvl4.png')";
                }
                else if(horsDec>50){
                    forestBgImg.style.backgroundImage = "url('/assets/bgImg/Forestlvl3.png')";
                }
                else if(horsDec>30){
                    forestBgImg.style.backgroundImage = "url('/assets/bgImg/Forestlvl2.png')";
                }
                else {
                    forestBgImg.style.backgroundImage = "url('/assets/bgImg/Forestlvl1.png')";
                }
            }catch(err){
                    console.error(err);
                }
        }

        function renderExistingTrees(){
            const ground = document.getElementById("forestBgImg");
            const trees = JSON.parse(localStorage.getItem("treeSIF") || "[]");
            
            trees.forEach(({x,y}) => {
                const tree = document.createElement("img");
                tree.src = "./assets/treeSapling.png";
                tree.className = "absolute w-16 h-16 z-10";
                tree.style.left = `${x}%`;
                tree.style.top = `${y-4}%`;

                ground.appendChild(tree);
            });
            return trees;
        }   

        function plantTreeAt(x,y){
            const ground = document.getElementById("forestBgImg");
            const tree = document.createElement("img");
            tree.src = "./assets/treeSapling.png";
            tree.className = "absolute w-16 h-16 z-10";
            tree.style.left = `${x}%`;
            tree.style.top = `${y-4}%`;
            ground.appendChild(tree);
        }
        async function putTreeSapling(){
            try{
                const stats = await getHackatimeStats();
                const horsDec = stats.total_seconds / 3600;

                const targetTreeCount = Math.floor(horsDec);
                const exisitngTrees = JSON.parse(localStorage.getItem("treeSIF")||"[]");
                const plantedCount = exisitngTrees.length;

                if(targetTreeCount > plantedCount) {
                    for(let i = 0; i<targetTreeCount-plantedCount; i++) {
                        const { hole,x,y } = genTreeHole();
                        const type = pickRandomPlantType();
                        setTimeout(()=> {
                            
                            hole.remove();
                            renderAllPlants(stats.total_seconds);
                        }, 700);
                        exisitngTrees.push({
                            x,y,type,
                            plantedAtSeconds:stats.total_seconds,
                            stageThresholds: rollStageThresholds(type)
                        });
                        localStorage.setItem("treeSIF", JSON.stringify(exisitngTrees));
                    }
                }else{
                    renderAllPlants(stats.total_seconds);
                }
                renderTierBoard();
            }catch(err){
                    console.error(err);
                }
        }
        putTreeSapling();
        backgroundImgChanges();
        setInterval(putTreeSapling, 60000);
        setInterval(backgroundImgChanges, 60000);
    </script>
</body>
</html>
