    <style>
        .page-transition{
            animation: walkForward 1.2s ease-in forwards;
        }

        @keyframes walkForward {
            0% {transform: scale(1); filter: brightness(1);}
            100% {transform:scale(1.8); filter:brightness(0.2);}
        }

        .mainDiv.arriving-dashboard{
            animation: arriveAtDashboard 1s ease-out;
        }
        @keyframes arriveAtDashboard {
            from {transform: scale(1.8); filter:brightness(0.2);}
            to {transform: scale(1); filter:brightness(1);}
        }

        .firefly {
            position: absolute;
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, #fffb8f 0%, rgba(255,251,143,0) 70%);
            border-radius: 50%;
            box-shadow: 0 0 6px 2px rgba(255,251,143,0.8);
            pointer-events: none;
            animation: flicker 2s ease-in-out infinite, drift 8s ease-in-out infinite;

        }

        @keyframes flicker {
            0%, 100% {opacity:0.2;}
            50% {opacity:1;}
        }

        @keyframes drift{
            0% {transform:translate(0,0);}
            25% {transform:translate(var(--dx1), var(--dy1));}
            50% {transform:translate(var(--dx2), var(--dy2));}
            75% {transform:translate(var(--dx3), var(--dy3));}
            100% {transform:translate(0,0);}
        }
    </style>

;            }

        async function loadUserStats(){
            const storedToken = localStorage.getItem("hackatimetok");
            try {
                const res = await fetch("/api/stats", {
                    cache:"no-store",
                    hedaers: storedToken ? {"Authorization":`Bearer ${storedToken}}`}:{}
                });

                if (!res.ok){
                    throw new Error("couldnt load")
                }
                const stats = await res.json();

                document.getElementById("total-hours-display").innerHTML = stats.total_hours
