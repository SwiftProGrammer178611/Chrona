    <script>
        const client_id = "UvqLX8h40jmFW2BZKYimI73Vzn5mFOYVoPwAj24nkHI";
        const params = new URLSearchParams(window.location.search);
        const hashParams = new URLSearchParams(window.location.hash.slice(1));

        const tokFromRedir = hashParams.get("token");
        if(tokFromRedir){
            localStorage.setItem("hackatimetok", tokFromRedir);
            history.replaceState(null, "", window.location.pathname);
        }
        const code = params.get("code"); 
        let goal = 10;

        async function checkGoal() {
            if(stats.total_hours > 10){
                console.log("You reached your goal!")
            }
        }

        const redirect_uri = encodeURIComponent(
            "http://localhost:3000/callback"
        );

        function theForest() {
            window.location.href = "/forest.html";
        }

        function connectHackatime(){
            const authUrl=`https://hackatime.hackclub.com/oauth/authorize` + `?client_id=${client_id}` + `&redirect_uri=${redirect_uri}` + `&response_type=code` + `&scope=profile+read`;
            window.location.href = authUrl;
        }

        async function loadUserStats(){
            const storedToken = localStorage.getItem("hackatimetok");
            try {
                const res = await fetch("/api/stats", {
                    cache:"no-store",
                    hedaers: storedToken ? {"Authorization":`Bearer ${storedToken}}`}:{}
                });

                if (!res.ok){
                    throw new Error("couldnt load")
                }
                const stats = await res.json();

                document.getElementById("total-hours-display").innerHTML = stats.total_hours
            }catch(error){
                console.error(error);
                document.getElementById("total-hours-display").innerHTML = "failed"
            }
        }

        window.addEventListener("DOMContentLoaded", loadUserStats);
    </script>
